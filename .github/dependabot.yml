# Dependabot — version-update PRs only when a new version escapes the
# declared caret range, all matching updates bundled into one PR per
# ecosystem per cycle. Security advisories are a separate, always-on
# channel and continue to fire regardless of these settings.
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    versioning-strategy: 'increase-if-necessary'
    groups:
      npm-deps:
        patterns: ['*']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      gh-actions:
        patterns: ['*']
